<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, initial-scale=1, maximum-scale=1">
    <script src="/javascript/p5.js"></script>
    <!--<script src="/javascript/p5.sound.min.js"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <!-- my libraries here -->
    <title>Poetry Machine</title>
    <script src="poetry.js"></script>
    <!--styles -->
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body onload="setupRita()">
    <h1>Poetry Machine</h1>
    <p>
      Replace nouns in any given phrase or sentence.<br>
      Adjust font size and background color.
    </p>
    <div class="inputPanel">
      <script src="/javascript/rita-full.js"></script>
      <input type="text" name="input" id="textInput" value="box of type" size="40"><br>
      <button type="button" name="button" id="enter" onclick="processRita()">enter</button>
    </div>
    <div class="inputPanel">
      <table>
        <tr>
          <td class="hsb">font-size</td>
          <td class="hsb" id="fsV">16px</td>
          <td class="sliderD">
            <input type="range" class="slider" id="fontSizeR" name="fontSizeR" min="4" max="60" value="16" onchange="updateFontSize()">
          </td>
        </tr>
        <tr>
          <td colspan="3">
            <br>
          </td>
        </tr>
        <tr>
          <td class="hsb">hue</td>
          <td class="hsb" id="hV">180</td>
          <td class="sliderD">
            <input type="range" class="slider" id="hueR" name="hueR" min="0" max="360" value="180" onchange="updateBackground()">
          </td>
        </tr>
        <tr>
          <td class="hsb">saturation</td>
          <td class="hsb" id="sV">50%</td>
          <td class="sliderD">
            <input type="range" class="slider" id="saturationR" name="saturationR" min="0" max="100" value="50" onchange="updateBackground()">
          </td>
        </tr>
        <tr>
          <td class="hsb">brightness</td>
          <td class="hsb" id="bV">50%</td>
          <td class="sliderD">
            <input type="range" class="slider" id="brightnessR" name="brightnessR" min="0" max="100" value="50" onchange="updateBackground()">
          </td>
        </tr>
      </table>
    </div>
    <div id="canvasContainer">
      <!--<script src="sketch.js"></script>-->
    </div>
    <p id="mainPara"></p>
    <p id="outputTxt">
    </p>
  </body>
</html>
